{% extends 'warehouse/base.html' %}

{% block title %}Пароль змінено{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
    <div class="card border-0 shadow-sm text-center" style="max-width:440px;width:100%;border-radius:16px;">
        <div class="card-body p-5">
            <div class="rounded-circle bg-success bg-opacity-10 d-inline-flex align-items-center justify-content-center mb-4"
                 style="width:80px;height:80px;">
                <i class="bi bi-check-lg text-success" style="font-size:2.2rem;"></i>
            </div>
            <h4 class="fw-bold mb-2">Пароль змінено!</h4>
            <p class="text-muted mb-4" style="font-size:.95rem;">
                Ваш пароль успішно оновлено.<br>
                Використовуйте його при наступному вході.
            </p>
            <a href="{% url 'profile' %}" class="btn btn-success fw-semibold px-4 py-2" style="border-radius:10px;">
                <i class="bi bi-person me-1"></i>Повернутись до профілю
            </a>
        </div>
    </div>
</div>
{% endblock %}
